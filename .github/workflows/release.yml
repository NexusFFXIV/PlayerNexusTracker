name: Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2025-vs2026
    permissions:
      contents: write   # for creating GitHub Releases on tag
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Dalamud
        shell: pwsh
        run: |
          $hookDir = "$env:APPDATA\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Path $hookDir -Force | Out-Null
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Path latest.zip -DestinationPath $hookDir -Force

      - name: Restore
        env:
          GITHUB_PACKAGES_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet restore PlayerNexusTracker.sln

      - name: Build (Release)
        env:
          GITHUB_PACKAGES_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet build PlayerNexusTracker.sln -c Release -p:Platform=x64 --no-restore

      - name: Package plugin
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $artifactDir = "./artifacts"
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null
          $binDir = "./PlayerNexusTracker.Plugin/bin/x64/Release"
          # DalamudPackager creates the plugin distribution zip + the .json manifest
          # under the project's bin output. We attach BOTH as release assets so the
          # NexusFFXIV/DalamudRepo pluginmaster-build script can read the manifest
          # without having to unzip the plugin payload.
          #
          # DalamudPackager emits `<binDir>/<InternalName>/latest.zip` (the
          # distribution bundle, ONLY the runtime files) plus a copy of the
          # manifest at the same depth. The full bin/ tree contains many more
          # files which Dalamud doesn't need (and which would bloat the zip).
          $zip = Get-ChildItem -Recurse -Path $binDir -Filter "latest.zip" | Select-Object -First 1
          if (-not $zip) {
            Write-Warning "DalamudPackager output 'latest.zip' not found — falling back to a Compress-Archive of the bin tree (larger than ideal, may include unused files)."
            Compress-Archive -Path "$binDir/*" -DestinationPath "$artifactDir/PlayerNexusTracker-$version.zip" -Force
          } else {
            Copy-Item $zip.FullName "$artifactDir/PlayerNexusTracker-$version.zip"
          }
          # Prefer the manifest next to latest.zip (clean DalamudPackager output)
          # over the one at the bin root.
          $json = Get-ChildItem -Recurse -Path $binDir -Filter "PlayerNexusTracker.json" | Sort-Object FullName | Select-Object -First 1
          if ($json) {
            Copy-Item $json.FullName "$artifactDir/PlayerNexusTracker.json"
          } else {
            Write-Warning "PlayerNexusTracker.json manifest not found in bin output — DalamudRepo update will skip this release."
          }
          Get-ChildItem $artifactDir

      - name: Upload artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v5
        with:
          name: plugin
          path: ./artifacts/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: ./artifacts/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Notify DalamudRepo
        # Sends a repository_dispatch event to NexusFFXIV/DalamudRepo so its
        # update.yml workflow immediately rebuilds pluginmaster.json against this
        # newly published release. Requires the org secret DALAMUD_REPO_DISPATCH_TOKEN
        # (fine-grained PAT with contents:write on NexusFFXIV/DalamudRepo only).
        # If the dispatch fails (missing secret, network blip, …) the receiver
        # workflow still runs on its 6-hourly cron — this step is best-effort.
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.DALAMUD_REPO_DISPATCH_TOKEN }}
        run: |
          gh api repos/NexusFFXIV/DalamudRepo/dispatches `
            -F event_type=plugin-release `
            -F client_payload[plugin]=PlayerNexusTracker `
            -F client_payload[tag]=${{ github.ref_name }} `
            -F client_payload[prerelease]=${{ contains(github.ref_name, '-') }}
