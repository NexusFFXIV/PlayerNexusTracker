version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "github-actions"]
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "nuget"]
    groups:
      microsoft-extensions:
        patterns: ["Microsoft.Extensions.*"]
      nexuskit:
        patterns: ["NexusKit.*"]
