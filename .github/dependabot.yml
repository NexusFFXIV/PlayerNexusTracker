version: 2

# Dependabot runs in its own sandbox with no access to Actions secrets — it has
# a separate secret store. The NexusFFXIV GitHub Packages NuGet feed needs the
# `NEXUSFFXIV_GHP_READ_TOKEN` Dependabot org-secret to authenticate; declared
# here as a registry and referenced from the nuget update block below.
registries:
  nexusffxiv-ghp:
    type: nuget-feed
    url: https://nuget.pkg.github.com/NexusFFXIV/index.json
    token: ${{ secrets.NEXUSFFXIV_GHP_READ_TOKEN }}

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "github-actions"]
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: "nuget"
    directory: "/"
    registries:
      - nexusffxiv-ghp
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "nuget"]
    groups:
      # Group NexusKit + Microsoft.Extensions together — NexusKit transitively
      # pulls specific Microsoft.Extensions.* versions, so bumping them apart
      # can produce NU1605 package-downgrade errors. Coordinated bumps avoid it.
      microsoft-platform:
        patterns:
          - "Microsoft.Extensions.*"
          - "NexusKit.*"
