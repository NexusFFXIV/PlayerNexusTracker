version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "github-actions"]
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "nuget"]
    groups:
      # Group NexusKit + Microsoft.Extensions together — NexusKit transitively
      # pulls specific Microsoft.Extensions.* versions, so bumping them apart
      # can produce NU1605 package-downgrade errors. Coordinated bumps avoid it.
      microsoft-platform:
        patterns:
          - "Microsoft.Extensions.*"
          - "NexusKit.*"
